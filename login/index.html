<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Administrativo Ultra</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
    <section class="login-card">
        <div class="login-brand">
            <div>
                <h1>Panel Administrativo</h1>
                <p>ULTRACOMP / ULTRASOFT</p>
            </div>
            <div class="brand-mark">UA</div>
        </div>

        <form id="loginForm">
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required placeholder="ultrasoftsolicitud@gmail.com">
            </div>

            <div class="form-field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Tu contraseña">
            </div>

            <button class="primary-button" type="submit">Iniciar sesión</button>
            <div id="loginError" class="login-error" role="alert"></div>
        </form>

        <div class="login-hint">
            Acceso exclusivo para personal autorizado.
        </div>
    </section>

    <script src="/admin/admin-data.js"></script>
    <script src="/admin/admin.js"></script>
</body>
</html>
